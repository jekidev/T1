    <script>
      // An exposed Devin tunnel may embed basic-auth credentials in the URL.
      // Browsers block in-page fetch() for relative URLs when the document's
      // base URL contains credentials. Reload once to the same URL without
      // credentials so the browser can use its cached basic-auth token for all
      // subsequent API calls without showing a login prompt.
      (function () {
        try {
          const url = new URL(document.baseURI || window.location.href);
          if (url.username || url.password) {
            url.username = '';
            url.password = '';
            window.location.replace(url.toString());
          }
        } catch {}
      })();
    </script>
