    <script>
      // An exposed Devin tunnel may embed basic-auth credentials in the URL.
      // Browsers block fetch() when a request URL contains credentials, so we
      // capture the token from the document's base URL and attach it as a
      // standard Authorization header to same-origin API calls instead.
      (function () {
        try {
          const base = new URL(document.baseURI || window.location.href);
          if (base.username || base.password) {
            window.__DEVIN_BASIC_AUTH__ =
              'Basic ' + btoa(unescape(encodeURIComponent(base.username + ':' + base.password)));
          }
        } catch {}

        const originalFetch = window.fetch;
        window.fetch = function (input, init) {
          if (!window.__DEVIN_BASIC_AUTH__) return originalFetch(input, init);
          try {
            const urlStr =
              typeof input === 'string'
                ? input
                : input instanceof URL
                  ? input.toString()
                  : input.url;
            if (typeof urlStr !== 'string') return originalFetch(input, init);

            const base = new URL(document.baseURI || window.location.href);
            const req = new URL(urlStr, base.toString());
            if (req.origin === base.origin) {
              const clean = new URL(req.toString());
              clean.username = '';
              clean.password = '';
              init = init || {};
              const headers = new Headers(init.headers);
              if (!headers.has('authorization')) {
                headers.set('authorization', window.__DEVIN_BASIC_AUTH__);
              }
              init = { ...init, headers };
              return originalFetch(clean.toString(), init);
            }
          } catch {}
          return originalFetch(input, init);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
