name: Deploy Urban Strategy Simulator to Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          PORT: 4173
          BASE_PATH: /T1/
        run: pnpm --filter @workspace/command-sim build

      - name: Prepare Pages artifact
        run: |
          test -f artifacts/command-sim/dist/public/index.html
          cp artifacts/command-sim/dist/public/index.html artifacts/command-sim/dist/public/404.html
          mkdir -p artifacts/command-sim/dist/public/rag
          cp -R rag/HackerAI_documents artifacts/command-sim/dist/public/rag/
          touch artifacts/command-sim/dist/public/.nojekyll

      - uses: actions/configure-pages@v5
        if: github.event_name != 'pull_request'

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: artifacts/command-sim/dist/public

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
