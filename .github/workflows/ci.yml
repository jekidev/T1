name: CI

on:
  push:
    branches: [main, feature/strategy-ecs-phase-a]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Validate Python worker syntax
        run: |
          python3 -m py_compile services/asset-worker/worker.py
          python3 -m py_compile services/coding-agent-worker/worker.py
          python3 -m py_compile services/coding-agent-worker/worker_v2.py
          python3 -m py_compile services/coding-agent-worker/network_gate.py
          python3 -m py_compile services/coding-agent-worker/providers/openhands_runner.py
          python3 -m py_compile services/coding-agent-worker/providers/aider_runner.py

      - name: Protect existing RAG files
        run: pnpm check:rag-preservation

      - name: Typecheck
        run: pnpm typecheck

      - name: Strategy asset and board integration tests
        run: pnpm test:integration

      - name: Build
        run: pnpm build
