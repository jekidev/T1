name: Graphics Branch Validate

on:
  push:
    branches: [feature/graphics-runtime-phase-1]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: graphics-runtime-phase-1
  cancel-in-progress: true

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/graphics-runtime-phase-1
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Regenerate lockfile and install
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Commit regenerated lockfile
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "Lockfile already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "Regenerate pnpm lockfile for graphics runtime"
          git push origin HEAD:feature/graphics-runtime-phase-1
